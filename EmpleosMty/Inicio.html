    <style>
        body { font-family: 'Lexend', sans-serif; }

        /* Animación de brillo espejo */
        @keyframes brillo {
            0% { left: -150%; }
            50% { left: 150%; }
            100% { left: 150%; }
        }

        .efecto-espejo {
            position: relative;
            overflow: hidden;
        }

        .efecto-espejo::after {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 50%;
            height: 100%;
            background: linear-gradient(
                to right, 
                rgba(255, 255, 255, 0) 0%, 
                rgba(255, 255, 255, 0.7) 50%, 
                rgba(255, 255, 255, 0) 100%
            );
            transform: skewX(-25deg);
            animation: brillo 3.5s infinite ease-in-out;
        }
    </style>
